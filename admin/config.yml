backend:
  name: git-gateway
  branch: main
media_folder: "uploads"
public_folder: "/uploads"
collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "content/home.yml"
        fields:
          - {label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string"}
          - {label: "Hero Headline", name: "hero_headline", widget: "string"}
          - {label: "Hero Text", name: "hero_text", widget: "text"}
      - label: "About Page"
        name: "about"
        file: "content/about.yml"
        fields:
          - {label: "Headline", name: "headline", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
  - name: "projects"
    label: "Project Photos"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Photo", name: "image", widget: "image"}
      - {label: "Description", name: "description", widget: "text", required: false}
